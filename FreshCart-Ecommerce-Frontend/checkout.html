<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Checkout | Fresh Cart</title>
  <link rel="stylesheet" href="css/style.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>

  <header>
    <div class="container">
      <nav>
        <a href="index.html" class="logo">
          <i class="fas fa-leaf"></i> Fresh<span>Cart</span>
        </a>
        <div class="nav-links">
          <a href="index.html" class="nav-link">Home</a>
          <a href="cart.html" class="nav-link">Cart</a>
        </div>
        <div class="nav-actions">
          <div id="auth-links" class="nav-links"></div>
        </div>
      </nav>
    </div>
  </header>

  <main class="container" style="padding: 40px 20px;">
    <h1>Checkout</h1>
    
    <div class="cart-container">
      <div class="cart-items-card">
        <h3>Shipping Information</h3>
        <form id="checkout-form" style="margin-top: 20px;">
          <div class="form-group">
            <label for="full-name">Full Name</label>
            <input type="text" id="full-name" placeholder="John Doe" required>
          </div>
          <div class="form-group">
            <label for="address">Shipping Address</label>
            <input type="text" id="address" placeholder="123 Fresh St, Organic City" required>
          </div>
          <div class="form-group" style="display: grid; grid-template-columns: 1fr 1fr; gap: 20px;">
            <div>
              <label for="phone">Phone Number</label>
              <input type="tel" id="phone" placeholder="+1 234 567 890" required>
            </div>
            <div>
              <label for="payment">Payment Method</label>
              <select id="payment" style="width: 100%; padding: 12px; border-radius: 8px; border: 1px solid #E2E8F0;">
                <option value="Cash">Cash on Delivery</option>
                <option value="Visa">Fake Visa (Simulation)</option>
              </select>
            </div>
          </div>
          
          <button type="submit" class="btn-primary" style="margin-top: 20px;">Place Order</button>
        </form>
      </div>

      <div class="cart-summary-card" id="checkout-summary">
        <!-- Dynamic Summary -->
      </div>
    </div>
  </main>

  <script type="module">
    import { getCartItems, getCartSubtotal } from './js/cart.js';
    import { placeOrder } from './js/checkout.js';
    import { formatPrice, showToast } from './js/main.js';
    import { getCurrentUser } from './js/auth.js';

    const summaryContainer = document.getElementById('checkout-summary');
    const checkoutForm = document.getElementById('checkout-form');
    const items = getCartItems();

    if (items.length === 0) {
      window.location.href = 'cart.html';
    }

    const user = getCurrentUser();
    if (user) {
      document.getElementById('full-name').value = user.name;
    }

    function renderSummary() {
      const subtotal = getCartSubtotal();
      const shipping = 5.00;
      const tax = subtotal * 0.1;
      const total = subtotal + shipping + tax;

      summaryContainer.innerHTML = `
        <h3 style="margin-bottom: 20px;">Your Order</h3>
        <div style="max-height: 300px; overflow-y: auto; margin-bottom: 20px;">
          ${items.map(item => `
            <div style="display: flex; justify-content: space-between; margin-bottom: 10px; font-size: 14px;">
              <span>${item.name} x ${item.quantity}</span>
              <span>${formatPrice(item.totalPrice)}</span>
            </div>
          `).join('')}
        </div>
        <div class="summary-row">
          <span>Subtotal</span>
          <span>${formatPrice(subtotal)}</span>
        </div>
        <div class="summary-row">
          <span>Shipping</span>
          <span>${formatPrice(shipping)}</span>
        </div>
        <div class="summary-row">
          <span>Tax</span>
          <span>${formatPrice(tax)}</span>
        </div>
        <div class="summary-row summary-total">
          <span>Total</span>
          <span>${formatPrice(total)}</span>
        </div>
      `;
    }

    checkoutForm.addEventListener('submit', (e) => {
      e.preventDefault();
      
      const shippingInfo = {
        name: document.getElementById('full-name').value,
        address: document.getElementById('address').value,
        phone: document.getElementById('phone').value,
        payment: document.getElementById('payment').value
      };

      const result = placeOrder(shippingInfo);

      if (result.success) {
        showToast('Order placed successfully! Redirecting to profile...');
        setTimeout(() => {
          window.location.href = 'profile.html';
        }, 2000);
      } else {
        showToast(result.message, 'error');
      }
    });

    renderSummary();
  </script>
  <script type="module" src="js/main.js"></script>
</body>
</html>
